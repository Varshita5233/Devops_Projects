version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto11

  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com

  build:
    commands:
      - cd devops-java-ecr-project
      - mvn clean package -DskipTests
      - docker build -t java-spring-ecr-project:latest .
      - docker tag java-spring-ecr-project:latest $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest

  post_build:
    commands:
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest
      - printf '[{"name":"java-app","imageUri":"%s"}]' $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest > imagedefinitions.json
      - aws ecs update-service --cluster java-ECR-project-dev-cluster --service java-ECR-project-dev-service --force-new-deployment --region ap-south-2

artifacts:
  files:
    - imagedefinitions.json