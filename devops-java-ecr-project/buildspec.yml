version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto11

  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com
      - echo "Getting commit ID..."
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "Commit hash: $COMMIT_HASH"

  build:
    commands:
      - echo "Building Java JAR with Maven..."
      - mvn clean package -DskipTests
      - echo "Building Docker image..."
      - docker build -t java-spring-ecr:latest .
      - docker tag java-spring-ecr:latest $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest
      - docker tag java-spring-ecr:latest $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:$COMMIT_HASH

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:$COMMIT_HASH
      - printf '[{"name":"java-app","imageUri":"%s"}]' $AWS_ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/java-spring-ecr-project:latest > imagedefinitions.json
      - aws ecs update-service --cluster java-spring-ecr-dev-cluster --service java-spring-ecr-dev-service --force-new-deployment --region ap-south-2

artifacts:
  files:
    - imagedefinitions.json